<div class="min-h-screen bg-gradient-to-br from-arica-blue via-blue-700 to-cyan-500 flex items-center justify-center p-4">
      <div class="w-full max-w-md">


        <div class="bg-white rounded-2xl shadow-2xl overflow-hidden">

          <div class="h-2 overflow-hidden">
            <img src="images/cuatro_colores.png" alt="" class="w-full h-full object-cover">
          </div>


          <div class="p-8 pb-6 bg-gradient-to-br from-arica-blue to-blue-600 text-white">
            <div class="text-center">
              <div class="mb-4">
                <img src="images/sol.png" alt="Logo Sol" class="w-20 h-20 mx-auto object-contain">
              </div>
              <h1 class="text-3xl font-bold mb-2">Bienvenido</h1>
              <p class="text-white/80">Sistema de Gestión de Eventos</p>
              <p class="text-white/90 font-semibold">Municipalidad de Arica</p>
            </div>
          </div>


          <div class="p-8">

            <div
              *ngIf="errorMensaje"
              class="mb-6 bg-red-50 border-l-4 border-red-500 p-4 rounded"
            >
              <div class="flex items-center gap-2">
                <svg class="w-5 h-5 text-red-500" fill="currentColor" viewBox="0 0 20 20">
                  <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd" />
                </svg>
                <p class="text-red-700 font-medium">{{ errorMensaje }}</p>
              </div>
            </div>

            <form (submit)="login($event)" class="space-y-6">

              <div>
                <label class="block text-arica-blue font-bold mb-2">
                  <div class="flex items-center gap-2">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                      <path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z" />
                      <path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z" />
                    </svg>
                    Correo Electrónico
                  </div>
                </label>
                <input
                  type="email"
                  [(ngModel)]="email"
                  name="email"
                  placeholder="tu.email@arica.cl"
                  required
                  class="w-full px-4 py-3 bg-arica-cyan/30 rounded-lg outline-none focus:ring-2 focus:ring-arica-blue transition-all"
                >
              </div>


              <div>
                <label class="block text-arica-blue font-bold mb-2">
                  <div class="flex items-center gap-2">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                      <path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd" />
                    </svg>
                    Contraseña
                  </div>
                </label>
                <div class="relative">
                  <input
                    [type]="mostrarPassword ? 'text' : 'password'"
                    [(ngModel)]="password"
                    name="password"
                    placeholder="••••••••"
                    required
                    class="w-full px-4 py-3 pr-12 bg-arica-cyan/30 rounded-lg outline-none focus:ring-2 focus:ring-arica-blue transition-all"
                  >
                  <button
                    type="button"
                    (click)="mostrarPassword = !mostrarPassword"
                    class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-500 hover:text-arica-blue transition-colors"
                  >

                    <svg *ngIf="!mostrarPassword" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                    </svg>

                    <svg *ngIf="mostrarPassword" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
                    </svg>
                  </button>
                </div>
              </div>


              <div class="flex items-center justify-between">
                <label class="flex items-center gap-2 cursor-pointer">
                  <input
                    type="checkbox"
                    [(ngModel)]="recordarme"
                    name="recordarme"
                    class="w-4 h-4 text-arica-blue rounded focus:ring-2 focus:ring-arica-blue"
                  >
                  <span class="text-gray-700 font-medium">Recordarme</span>
                </label>
                <a href="#" class="text-arica-blue hover:text-arica-blue-dark font-medium transition-colors">
                  ¿Olvidaste tu contraseña?
                </a>
              </div>


              <button
                type="submit"
                [disabled]="cargando"
                class="w-full bg-gradient-to-r from-arica-blue to-blue-600 hover:from-blue-700 hover:to-blue-800 text-white font-bold py-4 px-6 rounded-lg transition-all transform hover:scale-105 disabled:opacity-50 disabled:cursor-not-allowed disabled:transform-none flex items-center justify-center gap-2 shadow-lg"
              >
                <svg
                  *ngIf="cargando"
                  class="animate-spin h-5 w-5"
                  fill="none"
                  viewBox="0 0 24 24"
                >
                  <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                  <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <span>{{ cargando ? 'Iniciando sesión...' : 'Iniciar Sesión' }}</span>
              </button>
            </form>


            <div class="mt-6 text-center">
              <p class="text-gray-600 text-sm">
                Sistema exclusivo para personal autorizado de la Municipalidad de Arica
              </p>
            </div>
          </div>
        </div>


        
      </div>
    </div>
