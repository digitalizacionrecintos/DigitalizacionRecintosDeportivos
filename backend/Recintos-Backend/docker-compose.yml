services:
  db:
    image: postgres:15-alpine
    container_name: recintos-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=rambi
      - POSTGRES_PASSWORD=1234
      - POSTGRES_DB=recintos_db
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rambi -d recintos_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: recintos-app
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/recintos_db
      - SPRING_DATASOURCE_USERNAME=rambi
      - SPRING_DATASOURCE_PASSWORD=1234
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update

volumes:
  postgres-data: